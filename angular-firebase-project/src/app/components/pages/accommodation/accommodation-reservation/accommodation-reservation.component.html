<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Szállás foglalás</h2>
    <button class="btn btn-outline-secondary" (click)="backToAccommodation()">
      Vissza
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <div *ngIf="!loading && accommodation" class="row g-4">
    <div class="col-lg-7">
      <div class="card p-4 h-100">
        <h4 class="mb-2">{{ accommodation.name }}</h4>
        <p class="text-muted mb-3">
          {{ accommodation.city }}, {{ accommodation.address }}
        </p>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Érkezés</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="startDate"
              [min]="minCheckin"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Távozás</label>
            <input
              type="date"
              class="form-control"
              [(ngModel)]="endDate"
              [min]="minCheckout"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Vendégek száma</label>
            <input
              type="number"
              class="form-control"
              min="1"
              [max]="accommodation.persons || 20"
              [(ngModel)]="persons"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card p-4 reservation-summary">
        <h5 class="mb-3">Összegzés</h5>

        <div class="d-flex justify-content-between mb-2">
          <span>Ár / éj</span>
          <strong
            >{{ accommodation.price | smartPrice }}
            <span class="currency-eur">&euro;</span>
          </strong>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Éjszakák</span>
          <strong>{{ getNightsCount() }}</strong>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <span>Vendégek</span>
          <strong>{{ persons }}</strong>
        </div>

        <hr />

        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-bold">Végösszeg</span>
          <span class="fw-bold fs-4"
            >{{ totalPrice | smartPrice
            }}<span class="currency-eur">&euro;</span></span
          >
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger py-2">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="alert alert-success py-2">
          {{ successMessage }}
        </div>

        <button
          class="btn btn-primary w-100"
          [disabled]="submitting"
          (click)="submitReservation()"
        >
          <span
            *ngIf="submitting"
            class="spinner-border spinner-border-sm me-2"
            role="status"
          ></span>
          {{ submitting ? "Foglalás folyamatban..." : "Foglalás megerősítése" }}
        </button>
      </div>
    </div>
  </div>
</div>
