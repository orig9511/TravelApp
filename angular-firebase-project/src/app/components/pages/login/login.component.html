<div class="login-wrapper">
  <form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
    <!-- Email -->
    <div class="form-floating mb-3">
      <input
        type="email"
        class="form-control"
        formControlName="email"
        [placeholder]="'login.emailLabel' | translate"
      />
      <label>{{ "login.emailLabel" | translate }}</label>
    </div>

    <!-- PASSWORD -->
    <div class="form-floating mb-2">
      <input
        type="password"
        class="form-control"
        formControlName="password"
        [placeholder]="'login.passwordLabel' | translate"
      />
      <label>{{ "login.passwordLabel" | translate }}</label>
    </div>

    <!-- ERROR -->
    <div class="error-slot">
      <small class="text-danger" *ngIf="loginError">{{ loginError }}</small>
    </div>

    <!-- BUTTON + SPINNER -->
    <div class="mb-3 text-center">
      <button
        class="btn btn-primary login-btn"
        [disabled]="loginForm.invalid || isLoading"
      >
        <span
          *ngIf="isLoading"
          class="spinner-border spinner-border-sm me-2"
        ></span>
        <span>{{
          isLoading
            ? ("login.loggingIn" | translate)
            : ("login.loginButton" | translate)
        }}</span>
      </button>
    </div>

    <div class="text-center mt-3">
      <button
        type="button"
        class="google-btn"
        [disabled]="isGoogleLoading"
        (click)="loginWithGoogle()"
      >
        <span class="icon-wrapper">
          <!-- Google icon -->
          <span class="google-icon" [class.hide]="isGoogleLoading">
            <svg viewBox="0 0 48 48">
              <path
                fill="#EA4335"
                d="M24 9.5c3.2 0 6.1 1.1 8.4 3.2l6.3-6.3C34.7 2.4 29.7 0 24 0 14.7 0 6.7 5.3 2.7 13l7.7 6C12.2 13.2 17.7 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.7-2 5-4.2 6.6l6.6 5.1c3.9-3.6 6.4-9 6.4-15.7z"
              />
              <path
                fill="#FBBC05"
                d="M10.4 28.5c-.5-1.4-.8-2.9-.8-4.5s.3-3.1.8-4.5l-7.7-6C1 16.8 0 20.3 0 24s1 7.2 2.7 10.5l7.7-6z"
              />
              <path
                fill="#34A853"
                d="M24 48c6.5 0 12-2.1 16-5.8l-6.6-5.1c-2 1.4-4.5 2.2-9.4 2.2-6.3 0-11.8-3.7-13.6-9l-7.7 6C6.7 42.7 14.7 48 24 48z"
              />
            </svg>
          </span>

          <!-- Spinner -->
          <span class="google-spinner" [class.show]="isGoogleLoading"></span>
        </span>

        <span class="text">
          {{
            isGoogleLoading
              ? ("login.googleLoading" | translate)
              : ("login.googleButton" | translate)
          }}
        </span>
      </button>
    </div>

    <div class="text-center">
      <p>
        {{ "login.noAccount" | translate }}
        <a routerLink="/registration">{{ "login.registerLink" | translate }}</a>
      </p>
    </div>
  </form>
</div>
